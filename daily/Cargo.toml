chrono = "0.4"
wallpaper = "3.2"
winreg = "0.52"
dirs = "5.0"
anyhow = "1.0"
sha2 = "0.10"
hex = "0.4"
once_cell = "1.19"


[build-dependencies]
winres = "0.1"

